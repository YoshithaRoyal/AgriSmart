<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - AgriSmart</title>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <script src="{{ url_for('static', filename='theme.js') }}"></script>
</head>
<body>
    <div class="background-shapes">
        <div class="shape shape-1"></div>
        <div class="shape shape-2"></div>
        <div class="shape shape-3"></div>
    </div>

    <!-- Navigation Bar -->
    <nav class="navbar">
        <div class="nav-brand"><a href="{{ url_for('home') }}" style="color: white; text-decoration: none;">AgriSmart</a></div>
        <div class="nav-links">
            <a href="{{ url_for('login') }}">Login</a>
            <a href="{{ url_for('register') }}">Register</a>
            <select id="theme-selector">
                <option value="dark">Midnight</option>
                <option value="ocean">Ocean Blue</option>
            </select>
        </div>
    </nav>

    <div class="container" style="display: flex; justify-content: center; align-items: center; min-height: 100vh; padding-top: 5rem;">
        <div class="card form-card" style="width: 100%; max-width: 450px; padding: 3rem; margin-top: -5rem;">
            
            <div style="text-align: center; margin-bottom: 2.5rem;">
                <h2 style="font-size: 2.2rem; margin-bottom: 0.5rem; background: linear-gradient(to right, var(--primary-color), var(--secondary-color)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; border-bottom: none;">Create Account</h2>
                <p style="color: var(--text-muted); font-size: 1.1rem;">Join AgriSmart and track your farm</p>
            </div>

            {% with messages = get_flashed_messages(with_categories=true) %}
              {% if messages %}
                {% for category, message in messages %}
                  <div class="flash-msg {{ category }}">{{ message }}</div>
                {% endfor %}
              {% endif %}
            {% endwith %}
            
            <form action="{{ url_for('register') }}" method="POST">
                <div class="input-group" style="margin-bottom: 1.5rem;">
                    <label for="username" style="display: block;">Username</label>
                    <input type="text" id="username" name="username" required placeholder="Choose a username">
                </div>
                <div class="input-group" style="margin-bottom: 2.5rem;">
                    <label for="password" style="display: block;">Password</label>
                    <input type="password" id="password" name="password" required placeholder="Choose a password">
                </div>
                <button type="submit" style="font-size: 1.2rem;">Register</button>
            </form>
            
            <div style="text-align: center; margin-top: 2rem; border-top: 1px solid var(--border-color); padding-top: 1.5rem;">
                <p style="color: var(--text-muted);">Already have an account? <br>
                <a href="{{ url_for('login') }}" style="color: var(--primary-color); text-decoration: none; font-weight: 600; display: inline-block; margin-top: 0.5rem;">Login here</a></p>
            </div>
        </div>
    </div>
</body>
</html>
